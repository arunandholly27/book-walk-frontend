<div style="display: flex; flex-direction: column; gap: 1rem;">
    <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="date-user">
            <div>
                <label for="date" class="form-label">Date:</label>
                <input id="date" formControlName="entryDate" type="string" class="text-input" />
            </div>
            <div>
                <label for="user" class="form-label">User:</label>
                <input id="user" formControlName="user" type="text" class="text-input" />
            </div>
        </div>
        <div class="book" style="display: flex;">
            <div style="margin-bottom: 0.5rem;">
                <label for="book" class="form-label">Book:</label>
                <input id="book" formControlName="book" type="text" class="text-input" />
            </div>
            <div>
                <label for="pages" class="form-label">Pages Read:</label>
                <input id="pages" formControlName="pages" type="number" class="num-input" />
            </div>
        </div>
        <div class="walk" style="display: flex;">
            <div style="margin-bottom: 0.5rem;">
                <label for="walk" class="form-label">Walk Name:</label>
                <input id="walk" formControlName="walk" type="text" class="text-input" />
            </div>
            <div>
                <label for="miles" class="form-label">Miles Walked:</label>
                <input id="miles" formControlName="miles" type="number" class="num-input" />
            </div>
        </div>
    </form>
</div>
<div>
    <div  style="width: 50%; text-align: right;margin-top: 1rem;">
        <button type="submit" [disabled]="!entryForm.valid" 
           (click)="onSubmit()" style="font-size: medium;">Submit</button>
    </div>
</div>
