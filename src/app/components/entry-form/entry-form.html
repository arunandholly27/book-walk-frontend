<form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
    <label for="date">Date:</label>
    <input id="date" formControlName="entryDate" type="date" />

    <label for="user">User:</label>
    <input id="user" formControlName="user" type="text" />

    <label for="book">Book:</label>
    <input id="book" formControlName="book" type="text" />

    <label for="pages">Number of Pages:</label>
    <input id="pages" formControlName="pages" type="number" />

    <label for="walk">Walk Name:</label>
    <input id="walk" formControlName="walk" type="text" />

    <label for="miles">Miles:</label>
    <input id="miles" formControlName="miles" type="number" />
</form>
<button type="submit" [disabled]="!entryForm.valid" (click)="onSubmit()">Submit</button>
